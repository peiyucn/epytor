<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="50%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>

  <!-- 圆角方形背景 -->
  <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="url(#bg)" stroke="#0D3B0F" stroke-width="6"/>

  <!-- 棱角字体：Arial Black Heavy + 拉伸 -->
  <g transform="translate(256,256) scale(1, 1.4)">
    <text x="0" y="22" text-anchor="middle"
          font-family="'Arial Black', Arial, sans-serif"
          font-size="140" font-weight="900" font-style="italic"
          letter-spacing="0"
          fill="#C8E6C9"
          stroke="#0D3B0F"
          stroke-width="7"
          stroke-linejoin="miter"
          paint-order="stroke fill">
      epytor
    </text>
  </g>
</svg>
