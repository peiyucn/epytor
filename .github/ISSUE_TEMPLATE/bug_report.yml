name: 🐛 Bug report
description: Describe a problem
labels: bug
assignees: peiyucn
title: '[Bug] '

body:
  - type: markdown
    attributes:
      value: |
        Before submitting:
        - Make sure you're using the latest version
        - Search [existing issues](https://github.com/peiyucn/epytor/issues) to avoid duplicates

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and confirmed this is not a duplicate
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the problem
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Open a .md file
        2. ...
        3. Observe the result
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happens?
    validations:
      required: true

  - type: input
    id: vs-code-version
    attributes:
      label: VS Code version
      description: Help → About → Copy version info
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: EPYTOR version
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Output panel → EPYTOR → paste relevant logs (if any)
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag and drop screenshots here if applicable
    validations:
      required: false
