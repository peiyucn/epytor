name: 🚀 Feature request
description: Suggest an idea
labels: enhancement
assignees: peiyucn
title: '[Feature] '

body:
  - type: markdown
    attributes:
      value: |
        Before submitting:
        - Search [existing issues](https://github.com/peiyucn/epytor/issues) to avoid duplicates
        - For questions, use [Discussions](https://github.com/peiyucn/epytor/discussions)

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and confirmed this is not a duplicate
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? What use case does this address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've thought about?
    validations:
      required: false
